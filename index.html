<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Light Painter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Courier New', monospace;
  }
  #video {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.10;
    transform: scaleX(-1);
    pointer-events: none;
    z-index: 0;
  }
  #mainCanvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  /* ── UI overlay ── */
  #ui {
    position: fixed; z-index: 20; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: #000;
    transition: opacity 0.8s ease;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }
  #ui h1 {
    font-size: clamp(1.2rem, 4.5vw, 2rem);
    letter-spacing: 0.25em; font-weight: 300;
    text-transform: uppercase; color: #fff;
    text-shadow: 0 0 40px rgba(150,220,255,0.7);
  }
  #ui p {
    font-size: 0.72rem; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.38);
    text-align: center; max-width: 270px; line-height: 2;
  }
  #startBtn {
    padding: 13px 36px;
    border: 1px solid rgba(150,220,255,0.4);
    background: transparent;
    color: rgba(150,220,255,0.85);
    font-family: 'Courier New', monospace;
    font-size: 0.7rem; letter-spacing: 0.25em;
    text-transform: uppercase; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }
  #startBtn:active { background: rgba(150,220,255,0.1); }
  #errMsg {
    color: rgba(255,110,110,0.8); font-size: 0.66rem;
    display: none; max-width: 270px;
    text-align: center; line-height: 1.8; letter-spacing: 0.05em;
  }
  #loadMsg {
    position: fixed; z-index: 25;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: rgba(150,220,255,0.65);
    text-transform: uppercase; display: none; text-align: center;
  }
  #hint {
    position: fixed; bottom: 26px; width: 100%;
    text-align: center; z-index: 5;
    font-size: 0.58rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase; pointer-events: none;
    transition: opacity 1.5s;
  }
  #hint.gone { opacity: 0; }
  /* fingertip ring */
  #ring {
    position: fixed; width: 28px; height: 28px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 50%; pointer-events: none; z-index: 9;
    transform: translate(-50%,-50%); opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="mainCanvas"></canvas>
<div id="ring"></div>
<div id="loadMsg"></div>

<div id="ui">
  <h1>Hand Light Painter</h1>
  <p>Point your index finger at the camera and move it to paint.</p>
  <button id="startBtn">Enable Camera</button>
  <p id="errMsg"></p>
</div>
<div id="hint">raise your index finger to paint</div>

<script>
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.crossOrigin = 'anonymous';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

(() => {
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('mainCanvas');
  const ctx      = canvas.getContext('2d');
  const ui       = document.getElementById('ui');
  const startBtn = document.getElementById('startBtn');
  const errMsg   = document.getElementById('errMsg');
  const loadMsg  = document.getElementById('loadMsg');
  const hint     = document.getElementById('hint');
  const ring     = document.getElementById('ring');

  // ── Resize ────────────────────────────────────────────────────────────────
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Trail point: {x, y, t (timestamp), vx, vy} ───────────────────────────
  // We keep a rolling buffer and draw from scratch each frame with alpha = age-based
  const TRAIL_DURATION = 2000; // ms — points older than this are removed
  const trail = [];             // array of {x, y, t}

  // Chasing dot
  const dot = { x: -999, y: -999 };
  const finger = { x: -999, y: -999 };

  // Particles
  const sparks = [];

  let hue = 180;
  let lastX = 0, lastY = 0;
  let handVisible = false;
  let lostTimer = null;
  let hintHidden = false;
  let loopStarted = false;

  // ── Spawn sparks ──────────────────────────────────────────────────────────
  function spawnSparks(x, y, speed) {
    const n = Math.min(Math.floor(speed * 0.3), 6);
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const v = (0.3 + Math.random() * 1.8) * (speed * 0.025 + 0.4);
      sparks.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        life: 1,
        decay: 0.025 + Math.random() * 0.035,
        r: 0.6 + Math.random() * 1.4,
        hue: hue + (Math.random() - 0.5) * 60
      });
    }
  }

  // ── Smooth the trail via Chaikin subdivision ──────────────────────────────
  // Run 2 passes to get very smooth curves from raw points
  function chaikin(pts, passes = 2) {
    if (pts.length < 3) return pts;
    let out = pts;
    for (let p = 0; p < passes; p++) {
      const next = [out[0]];
      for (let i = 0; i < out.length - 1; i++) {
        const a = out[i], b = out[i + 1];
        next.push({
          x: a.x * 0.75 + b.x * 0.25,
          y: a.y * 0.75 + b.y * 0.25,
          t: a.t * 0.75 + b.t * 0.25
        });
        next.push({
          x: a.x * 0.25 + b.x * 0.75,
          y: a.y * 0.25 + b.y * 0.75,
          t: a.t * 0.25 + b.t * 0.75
        });
      }
      next.push(out[out.length - 1]);
      out = next;
    }
    return out;
  }

  // ── Main render ───────────────────────────────────────────────────────────
  function render() {
    const W = canvas.width, H = canvas.height;
    const now = performance.now();

    // Hard clear each frame — fade is baked into per-segment alpha
    ctx.clearRect(0, 0, W, H);

    // Remove expired trail points
    while (trail.length > 0 && now - trail[0].t > TRAIL_DURATION) {
      trail.shift();
    }

    // Draw trail
    if (trail.length >= 3) {
      const smooth = chaikin(trail, 2);

      // ── Design: triple-layer aurora ribbon ──────────────────────────────
      // Layer 1: wide soft outer glow
      // Layer 2: mid colour ribbon
      // Layer 3: bright thin core

      for (let layer = 0; layer < 3; layer++) {
        const isCore  = layer === 2;
        const isMid   = layer === 1;
        const isOuter = layer === 0;

        for (let i = 1; i < smooth.length; i++) {
          const prev = smooth[i - 1];
          const curr = smooth[i];

          // age: 0 = just drawn, 1 = about to expire
          const age  = (now - curr.t) / TRAIL_DURATION;
          const life = 1 - age; // 1 → 0

          // Ease: fast fade at end, stays bright while fresh
          const alpha = Math.pow(life, 1.6);
          if (alpha < 0.005) continue;

          // Colour shifts along trail
          const h = (curr.hue !== undefined ? curr.hue : hue);

          let lineW, strokeAlpha, blur, color;

          if (isOuter) {
            lineW       = 18;
            strokeAlpha = alpha * 0.12;
            blur        = 28;
            color       = `hsla(${h}, 90%, 75%, ${strokeAlpha})`;
          } else if (isMid) {
            lineW       = 5;
            strokeAlpha = alpha * 0.55;
            blur        = 12;
            color       = `hsla(${h}, 85%, 82%, ${strokeAlpha})`;
          } else {
            // core: very thin, bright white-ish
            lineW       = 1.2;
            strokeAlpha = alpha * 0.95;
            blur        = 6;
            color       = `hsla(${h}, 60%, 96%, ${strokeAlpha})`;
          }

          ctx.save();
          ctx.beginPath();
          ctx.moveTo(prev.x, prev.y);
          ctx.lineTo(curr.x, curr.y);
          ctx.strokeStyle = color;
          ctx.lineWidth   = lineW;
          ctx.lineCap     = 'round';
          ctx.lineJoin    = 'round';
          ctx.shadowColor = `hsla(${h}, 90%, 80%, ${alpha * 0.8})`;
          ctx.shadowBlur  = blur;
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    // ── Chasing dot ─────────────────────────────────────────────────────────
    dot.x += (finger.x - dot.x) * 0.09;
    dot.y += (finger.y - dot.y) * 0.09;

    if (dot.x > 0) {
      // outer halo
      const g = ctx.createRadialGradient(dot.x, dot.y, 0, dot.x, dot.y, 40);
      g.addColorStop(0,   `hsla(${hue},100%,100%,0.5)`);
      g.addColorStop(0.3, `hsla(${hue},90%,80%,0.15)`);
      g.addColorStop(1,   `hsla(${hue},80%,70%,0)`);
      ctx.beginPath();
      ctx.arc(dot.x, dot.y, 40, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      // bright centre dot
      ctx.beginPath();
      ctx.arc(dot.x, dot.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.shadowColor = `hsla(${hue},100%,95%,1)`;
      ctx.shadowBlur  = 16;
      ctx.fill();
      ctx.shadowBlur  = 0;
    }

    // ── Sparks ──────────────────────────────────────────────────────────────
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x  += s.vx; s.y  += s.vy;
      s.vx *= 0.91; s.vy *= 0.91;
      s.life -= s.decay;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }

      const a = s.life * s.life;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
      ctx.fillStyle   = `hsla(${s.hue},90%,88%,1)`;
      ctx.shadowColor = `hsla(${s.hue},90%,75%,1)`;
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.restore();
    }

    requestAnimationFrame(render);
  }

  // ── MediaPipe results ─────────────────────────────────────────────────────
  function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0][8];
      const rx = (1 - lm.x) * window.innerWidth;
      const ry = lm.y * window.innerHeight;

      const dx = rx - lastX, dy = ry - lastY;
      const speed = Math.sqrt(dx * dx + dy * dy);
      lastX = rx; lastY = ry;

      finger.x = rx; finger.y = ry;

      // Stamp hue onto each point so colour drifts per-point
      trail.push({ x: rx, y: ry, t: performance.now(), hue });
      if (trail.length > 800) trail.shift();

      spawnSparks(rx, ry, speed);

      ring.style.left    = rx + 'px';
      ring.style.top     = ry + 'px';
      ring.style.opacity = '0.6';

      handVisible = true;
      clearTimeout(lostTimer);

      if (!hintHidden) {
        hint.classList.add('gone');
        hintHidden = true;
      }
    } else {
      if (handVisible) {
        lostTimer = setTimeout(() => {
          handVisible = false;
          ring.style.opacity = '0';
        }, 600);
      }
    }
  }

  // ── Hue drift (independent of hand detection) ─────────────────────────────
  setInterval(() => { hue = (hue + 0.5) % 360; }, 16);

  // ── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    startBtn.disabled   = true;
    startBtn.textContent = 'Starting…';
    errMsg.style.display = 'none';
    ui.classList.add('hidden');
    loadMsg.style.display = 'block';

    try {
      loadMsg.textContent = '📷 Requesting camera…';
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      loadMsg.textContent = '⏳ Loading model… (10–20s on first load)';
      await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js');
      await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js');

      loadMsg.textContent = '🤖 Initializing…';
      const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
      });
      hands.setOptions({
        maxNumHands: 1, modelComplexity: 1,
        minDetectionConfidence: 0.7, minTrackingConfidence: 0.6
      });
      hands.onResults(onResults);

      const cam = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
      });
      await cam.start();

      loadMsg.style.display = 'none';
      if (!loopStarted) { loopStarted = true; render(); }

    } catch (err) {
      loadMsg.style.display = 'none';
      ui.classList.remove('hidden');
      startBtn.disabled    = false;
      startBtn.textContent = 'Retry';
      errMsg.style.display = 'block';
      if (err.name === 'NotAllowedError') {
        errMsg.textContent = '❌ Camera denied.\nAllow camera in browser settings, then tap Retry.';
      } else {
        errMsg.textContent = '❌ ' + err.message;
      }
    }
  }

  startBtn.addEventListener('click', init);
})();
</script>
</body>
</html>
