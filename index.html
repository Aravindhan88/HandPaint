<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Light Painter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  #video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.13;
    transform: scaleX(-1);
    pointer-events: none;
    z-index: 0;
  }
  #trailCanvas, #glowCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #trailCanvas { z-index: 1; }
  #glowCanvas  { z-index: 2; }

  #ui {
    position: fixed;
    z-index: 20;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(0,0,0,0.92);
    transition: opacity 0.7s ease;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }

  #ui h1 {
    font-size: clamp(1.3rem, 5vw, 2.2rem);
    letter-spacing: 0.18em;
    font-weight: 300;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(100,200,255,0.8);
  }
  #ui p {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.45);
    text-align: center;
    max-width: 300px;
    line-height: 1.9;
  }
  #startBtn {
    padding: 14px 40px;
    border: 1px solid rgba(100,200,255,0.55);
    background: transparent;
    color: rgba(100,200,255,0.95);
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #startBtn:active { background: rgba(100,200,255,0.18); }

  #statusMsg {
    position: fixed;
    bottom: 28px;
    width: 100%;
    text-align: center;
    z-index: 15;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 1s;
  }
  #statusMsg.hidden { opacity: 0; }

  #loadingMsg {
    position: fixed;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    z-index: 25;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(100,200,255,0.7);
    text-transform: uppercase;
    display: none;
  }

  #ring {
    position: fixed;
    width: 38px; height: 38px;
    border: 1.5px solid rgba(100,200,255,0.65);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9;
    transform: translate(-50%, -50%);
    opacity: 0;
    box-shadow: 0 0 14px rgba(100,200,255,0.45);
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="trailCanvas"></canvas>
<canvas id="glowCanvas"></canvas>
<div id="ring"></div>
<div id="loadingMsg">⏳ Loading hand tracking model…</div>

<div id="ui">
  <h1>Hand Light Painter</h1>
  <p>Raise your hand with index finger pointing up.<br>Move it to paint with light.</p>
  <button id="startBtn">Enable Camera</button>
  <p id="errMsg" style="color:rgba(255,100,100,0.75);font-size:0.68rem;display:none;max-width:280px;text-align:center;line-height:1.7;"></p>
</div>

<div id="statusMsg">waiting for hand…</div>

<script>
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.crossOrigin = 'anonymous';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

(async () => {
  const video      = document.getElementById('video');
  const trailC     = document.getElementById('trailCanvas');
  const glowC      = document.getElementById('glowCanvas');
  const tCtx       = trailC.getContext('2d');
  const gCtx       = glowC.getContext('2d');
  const ui         = document.getElementById('ui');
  const startBtn   = document.getElementById('startBtn');
  const errMsg     = document.getElementById('errMsg');
  const statusMsg  = document.getElementById('statusMsg');
  const loadingMsg = document.getElementById('loadingMsg');
  const ring       = document.getElementById('ring');

  function resize() {
    trailC.width = glowC.width = window.innerWidth;
    trailC.height = glowC.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── State ─────────────────────────────────────────────────────────────────
  const finger    = { x: -999, y: -999 };
  const dot       = { x: -999, y: -999 };
  const path      = [];
  const particles = [];
  let hue = 190, lastX = 0, lastY = 0, speed = 0;
  let handVisible = false, lostTimer = null, statusHidden = false;
  let loopStarted = false;

  // ── Catmull-Rom ───────────────────────────────────────────────────────────
  function catmullSeg(ctx, p0, p1, p2, p3) {
    const a = 0.5;
    const t0 = 0;
    const t1 = Math.pow(Math.hypot(p1.x-p0.x,p1.y-p0.y),a)+t0;
    const t2 = Math.pow(Math.hypot(p2.x-p1.x,p2.y-p1.y),a)+t1;
    const t3 = Math.pow(Math.hypot(p3.x-p2.x,p3.y-p2.y),a)+t2;
    if (!isFinite(t1)||!isFinite(t2)||t1===t0||t2===t1||t3===t2) return;
    for (let i=0;i<=14;i++) {
      const t=(t1+(t2-t1)*(i/14));
      const A1x=(t1-t)/(t1-t0)*p0.x+(t-t0)/(t1-t0)*p1.x, A1y=(t1-t)/(t1-t0)*p0.y+(t-t0)/(t1-t0)*p1.y;
      const A2x=(t2-t)/(t2-t1)*p1.x+(t-t1)/(t2-t1)*p2.x, A2y=(t2-t)/(t2-t1)*p1.y+(t-t1)/(t2-t1)*p2.y;
      const A3x=(t3-t)/(t3-t2)*p2.x+(t-t2)/(t3-t2)*p3.x, A3y=(t3-t)/(t3-t2)*p2.y+(t-t2)/(t3-t2)*p3.y;
      const B1x=(t2-t)/(t2-t0)*A1x+(t-t0)/(t2-t0)*A2x, B1y=(t2-t)/(t2-t0)*A1y+(t-t0)/(t2-t0)*A2y;
      const B2x=(t3-t)/(t3-t1)*A2x+(t-t1)/(t3-t1)*A3x, B2y=(t3-t)/(t3-t1)*A2y+(t-t1)/(t3-t1)*A3y;
      const Cx=(t2-t)/(t2-t1)*B1x+(t-t1)/(t2-t1)*B2x, Cy=(t2-t)/(t2-t1)*B1y+(t-t1)/(t2-t1)*B2y;
      i===0?ctx.moveTo(Cx,Cy):ctx.lineTo(Cx,Cy);
    }
  }

  // ── Particles ─────────────────────────────────────────────────────────────
  function spawnParticles(x,y,spd) {
    const count=Math.min(Math.floor(spd*0.35),8);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const vel=(0.4+Math.random()*2)*(spd*0.03+0.5);
      particles.push({x,y,vx:Math.cos(angle)*vel,vy:Math.sin(angle)*vel,
        life:1,decay:0.022+Math.random()*0.03,size:0.8+Math.random()*2,
        hue:hue+(Math.random()-0.5)*50});
    }
  }

  // ── Draw trail ────────────────────────────────────────────────────────────
  function drawTrail() {
    tCtx.fillStyle='rgba(0,0,0,0.022)';
    tCtx.fillRect(0,0,trailC.width,trailC.height);
    if(path.length<4)return;
    const start=Math.max(0,path.length-300);
    for(let i=start+1;i<path.length-2;i++){
      const p0=path[i-1],p1=path[i],p2=path[i+1],p3=path[i+2];
      const thick=Math.max(0.6,Math.min(6,5-p1.speed*0.07));
      tCtx.save();
      tCtx.shadowColor=`hsla(${p1.hue},90%,80%,.95)`;
      tCtx.shadowBlur=16+thick*2;
      tCtx.strokeStyle=`hsla(${p1.hue},80%,93%,.9)`;
      tCtx.lineWidth=thick; tCtx.lineCap=tCtx.lineJoin='round';
      tCtx.beginPath(); catmullSeg(tCtx,p0,p1,p2,p3); tCtx.stroke();
      tCtx.shadowBlur=38+thick*5; tCtx.globalAlpha=0.28; tCtx.lineWidth=thick*2.8;
      tCtx.beginPath(); catmullSeg(tCtx,p0,p1,p2,p3); tCtx.stroke();
      tCtx.restore();
    }
    if(path.length>2400)path.splice(0,path.length-2400);
  }

  // ── Draw glow ─────────────────────────────────────────────────────────────
  function drawGlow() {
    gCtx.clearRect(0,0,glowC.width,glowC.height);
    if(dot.x<0)return;
    const g=gCtx.createRadialGradient(dot.x,dot.y,0,dot.x,dot.y,54);
    g.addColorStop(0,`hsla(${hue},100%,100%,1)`);
    g.addColorStop(0.12,`hsla(${hue},90%,90%,.9)`);
    g.addColorStop(0.5,`hsla(${hue},80%,70%,.3)`);
    g.addColorStop(1,`hsla(${hue},70%,60%,0)`);
    gCtx.beginPath(); gCtx.arc(dot.x,dot.y,54,0,Math.PI*2);
    gCtx.fillStyle=g; gCtx.fill();
    gCtx.beginPath(); gCtx.arc(dot.x,dot.y,6,0,Math.PI*2);
    gCtx.fillStyle='#fff';
    gCtx.shadowColor=`hsla(${hue},100%,90%,1)`; gCtx.shadowBlur=22;
    gCtx.fill(); gCtx.shadowBlur=0;
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue;}
      gCtx.save(); gCtx.globalAlpha=p.life*p.life;
      gCtx.shadowColor=`hsla(${p.hue},90%,80%,1)`; gCtx.shadowBlur=10;
      gCtx.beginPath(); gCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      gCtx.fillStyle=`hsla(${p.hue},90%,90%,1)`; gCtx.fill(); gCtx.restore();
    }
  }

  function loop() {
    hue=(hue+0.2)%360;
    dot.x+=(finger.x-dot.x)*0.1;
    dot.y+=(finger.y-dot.y)*0.1;
    drawTrail(); drawGlow();
    requestAnimationFrame(loop);
  }

  // ── MediaPipe results ─────────────────────────────────────────────────────
  function onResults(results) {
    if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){
      const lm=results.multiHandLandmarks[0][8];
      const rx=(1-lm.x)*window.innerWidth;
      const ry=lm.y*window.innerHeight;
      const dx=rx-lastX,dy=ry-lastY;
      speed=Math.sqrt(dx*dx+dy*dy);
      lastX=rx; lastY=ry;
      finger.x=rx; finger.y=ry;
      path.push({x:rx,y:ry,speed,hue});
      spawnParticles(rx,ry,speed);
      ring.style.left=rx+'px'; ring.style.top=ry+'px'; ring.style.opacity='1';
      handVisible=true; clearTimeout(lostTimer);
      if(!statusHidden){statusMsg.classList.add('hidden');statusHidden=true;}
    } else {
      if(handVisible){
        lostTimer=setTimeout(()=>{
          handVisible=false; ring.style.opacity='0';
          statusMsg.textContent='waiting for hand…';
          statusMsg.classList.remove('hidden'); statusHidden=false;
        },800);
      }
    }
  }

  // ── Main init ─────────────────────────────────────────────────────────────
  async function init() {
    startBtn.disabled=true;
    startBtn.textContent='Starting…';
    errMsg.style.display='none';
    ui.classList.add('hidden');
    loadingMsg.style.display='block';

    try {
      // Step 1: get camera
      loadingMsg.textContent='📷 Requesting camera…';
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
      });
      video.srcObject=stream;
      await video.play();

      // Step 2: load MediaPipe
      loadingMsg.textContent='⏳ Loading hand tracking model… (may take 10-20s)';
      await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js');
      await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js');

      // Step 3: init hands
      loadingMsg.textContent='🤖 Initializing model…';
      const hands=new Hands({
        locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
      });
      hands.setOptions({
        maxNumHands:1, modelComplexity:1,
        minDetectionConfidence:0.7, minTrackingConfidence:0.6
      });
      hands.onResults(onResults);

      const cam=new Camera(video,{
        onFrame:async()=>{await hands.send({image:video});},
        width:640,height:480
      });
      await cam.start();

      loadingMsg.style.display='none';
      if(!loopStarted){loopStarted=true; loop();}

    } catch(err) {
      loadingMsg.style.display='none';
      ui.classList.remove('hidden');
      startBtn.disabled=false;
      startBtn.textContent='Retry';
      errMsg.style.display='block';
      if(err.name==='NotAllowedError'){
        errMsg.textContent='❌ Camera permission denied.\n\nGo to Chrome Settings → Site Settings → Camera → allow this site, then tap Retry.';
      } else if(err.name==='NotFoundError'){
        errMsg.textContent='❌ No camera found on this device.';
      } else {
        errMsg.textContent='❌ Error: '+err.message;
      }
    }
  }

  startBtn.addEventListener('click', init);
})();
</script>
</body>
</html>
