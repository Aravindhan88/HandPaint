<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Light Painter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }

  #video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.12;
    transform: scaleX(-1);   /* mirror so it feels natural */
    pointer-events: none;
    z-index: 0;
  }

  #trailCanvas, #glowCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #glowCanvas { z-index: 2; }

  /* ── UI Overlay ── */
  #ui {
    position: fixed;
    z-index: 10;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.85);
    transition: opacity 0.6s ease;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }

  #ui h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    letter-spacing: 0.2em;
    font-weight: 300;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 30px rgba(120,200,255,0.8);
  }
  #ui p {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45);
    text-align: center;
    max-width: 340px;
    line-height: 1.8;
  }
  #startBtn {
    margin-top: 8px;
    padding: 13px 38px;
    border: 1px solid rgba(120,200,255,0.5);
    background: transparent;
    color: rgba(120,200,255,0.9);
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }
  #startBtn:hover {
    background: rgba(120,200,255,0.12);
    box-shadow: 0 0 24px rgba(120,200,255,0.3);
  }

  /* ── Status bar ── */
  #status {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 1s;
  }
  #status.hidden { opacity: 0; }

  /* loading ring */
  #loader {
    width: 36px; height: 36px;
    border: 2px solid rgba(120,200,255,0.15);
    border-top-color: rgba(120,200,255,0.8);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* fingertip cursor ring */
  #ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1.5px solid rgba(120,200,255,0.6);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
    opacity: 0;
    box-shadow: 0 0 12px rgba(120,200,255,0.4);
  }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="trailCanvas"></canvas>
<canvas id="glowCanvas"></canvas>
<div id="ring"></div>

<div id="ui">
  <h1>Hand Light Painter</h1>
  <p>Point your index finger at the camera<br>and paint with light.</p>
  <div id="loader"></div>
  <button id="startBtn">Enable Camera</button>
</div>

<div id="status">waiting for hand…</div>

<!-- MediaPipe Hands (self-contained, no WASM fetch issues) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
(() => {
  // ── Elements ───────────────────────────────────────────────────────────────
  const video      = document.getElementById('video');
  const trailC     = document.getElementById('trailCanvas');
  const glowC      = document.getElementById('glowCanvas');
  const tCtx       = trailC.getContext('2d');
  const gCtx       = glowC.getContext('2d');
  const ui         = document.getElementById('ui');
  const startBtn   = document.getElementById('startBtn');
  const loader     = document.getElementById('loader');
  const statusEl   = document.getElementById('status');
  const ring       = document.getElementById('ring');

  // ── Canvas resize ──────────────────────────────────────────────────────────
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    [trailC, glowC].forEach(c => { c.width = w; c.height = h; });
  }
  resize();
  window.addEventListener('resize', resize);

  // ── State ──────────────────────────────────────────────────────────────────
  const finger   = { x: -999, y: -999 };   // raw mapped fingertip
  const dot      = { x: -999, y: -999 };   // chasing dot
  const path     = [];                      // trail points
  const particles = [];
  let hue        = 190;
  let lastX = 0, lastY = 0, speed = 0;
  let handVisible = false;
  let lostTimer   = null;
  let frameId     = null;
  let statusHidden = false;

  // ── MediaPipe setup ────────────────────────────────────────────────────────
  let hands, camera;

  function initMediaPipe() {
    hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640, height: 480
    });

    camera.start().then(() => {
      loader.style.display = 'none';
      ui.classList.add('hidden');
      requestAnimationFrame(loop);
    }).catch(err => {
      loader.style.display = 'none';
      startBtn.textContent  = 'Camera denied — retry';
      startBtn.style.display = 'block';
      console.error(err);
    });
  }

  // ── Results callback ───────────────────────────────────────────────────────
  // INDEX_FINGER_TIP = landmark 8
  function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm  = results.multiHandLandmarks[0][8];  // index tip
      const w   = window.innerWidth, h = window.innerHeight;

      // MediaPipe x is 0→1 left-to-right of the *un-mirrored* video.
      // We mirror the video display, so flip x for natural feel.
      const rx  = (1 - lm.x) * w;
      const ry  = lm.y * h;

      const dx  = rx - lastX, dy = ry - lastY;
      speed     = Math.sqrt(dx * dx + dy * dy);
      lastX = rx; lastY = ry;

      finger.x  = rx;
      finger.y  = ry;

      path.push({ x: rx, y: ry, speed, hue });
      spawnParticles(rx, ry, speed);

      handVisible = true;
      clearTimeout(lostTimer);

      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      ring.style.opacity = '1';

      if (!statusHidden) {
        statusEl.classList.add('hidden');
        statusHidden = true;
      }
    } else {
      if (handVisible) {
        lostTimer = setTimeout(() => {
          handVisible = false;
          ring.style.opacity = '0';
          statusEl.textContent = 'waiting for hand…';
          statusEl.classList.remove('hidden');
          statusHidden = false;
        }, 800);
      }
    }
  }

  // ── Particles ──────────────────────────────────────────────────────────────
  function spawnParticles(x, y, spd) {
    const count = Math.min(Math.floor(spd * 0.35), 9);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const vel   = (0.4 + Math.random() * 2.2) * (spd * 0.035 + 0.5);
      particles.push({
        x, y,
        vx: Math.cos(angle) * vel,
        vy: Math.sin(angle) * vel,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 0.8 + Math.random() * 2,
        hue: hue + (Math.random() - 0.5) * 50
      });
    }
  }

  // ── Catmull-Rom ────────────────────────────────────────────────────────────
  function catmullSeg(ctx, p0, p1, p2, p3, alpha = 0.5) {
    const t0 = 0;
    const t1 = Math.pow(Math.hypot(p1.x - p0.x, p1.y - p0.y), alpha) + t0;
    const t2 = Math.pow(Math.hypot(p2.x - p1.x, p2.y - p1.y), alpha) + t1;
    const t3 = Math.pow(Math.hypot(p3.x - p2.x, p3.y - p2.y), alpha) + t2;
    if (t1 === t0 || t2 === t1 || t3 === t2) return;

    const steps = 14;
    for (let i = 0; i <= steps; i++) {
      const t  = t1 + (t2 - t1) * (i / steps);
      const A1x = (t1-t)/(t1-t0)*p0.x + (t-t0)/(t1-t0)*p1.x;
      const A1y = (t1-t)/(t1-t0)*p0.y + (t-t0)/(t1-t0)*p1.y;
      const A2x = (t2-t)/(t2-t1)*p1.x + (t-t1)/(t2-t1)*p2.x;
      const A2y = (t2-t)/(t2-t1)*p1.y + (t-t1)/(t2-t1)*p2.y;
      const A3x = (t3-t)/(t3-t2)*p2.x + (t-t2)/(t3-t2)*p3.x;
      const A3y = (t3-t)/(t3-t2)*p2.y + (t-t2)/(t3-t2)*p3.y;
      const B1x = (t2-t)/(t2-t0)*A1x + (t-t0)/(t2-t0)*A2x;
      const B1y = (t2-t)/(t2-t0)*A1y + (t-t0)/(t2-t0)*A2y;
      const B2x = (t3-t)/(t3-t1)*A2x + (t-t1)/(t3-t1)*A3x;
      const B2y = (t3-t)/(t3-t1)*A2y + (t-t1)/(t3-t1)*A3y;
      const Cx  = (t2-t)/(t2-t1)*B1x + (t-t1)/(t2-t1)*B2x;
      const Cy  = (t2-t)/(t2-t1)*B1y + (t-t1)/(t2-t1)*B2y;
      if (i === 0) ctx.moveTo(Cx, Cy); else ctx.lineTo(Cx, Cy);
    }
  }

  // ── Draw trail (persistent + fading) ──────────────────────────────────────
  function drawTrail() {
    const w = trailC.width, h = trailC.height;
    tCtx.fillStyle = 'rgba(0,0,0,0.022)';
    tCtx.fillRect(0, 0, w, h);

    if (path.length < 4) return;

    const recent = Math.min(path.length, 300);
    const start  = path.length - recent;

    for (let i = start + 1; i < path.length - 2; i++) {
      const p0 = path[i-1], p1 = path[i], p2 = path[i+1], p3 = path[i+2];
      const thick = Math.max(0.6, Math.min(6, 5 - p1.speed * 0.07));

      // Core bright line
      tCtx.save();
      tCtx.shadowColor = `hsla(${p1.hue},90%,80%,0.95)`;
      tCtx.shadowBlur  = 16 + thick * 2;
      tCtx.strokeStyle = `hsla(${p1.hue},80%,93%,0.9)`;
      tCtx.lineWidth   = thick;
      tCtx.lineCap     = 'round';
      tCtx.lineJoin    = 'round';
      tCtx.beginPath();
      catmullSeg(tCtx, p0, p1, p2, p3);
      tCtx.stroke();

      // Outer bloom
      tCtx.shadowBlur  = 38 + thick * 5;
      tCtx.globalAlpha = 0.28;
      tCtx.lineWidth   = thick * 2.8;
      tCtx.beginPath();
      catmullSeg(tCtx, p0, p1, p2, p3);
      tCtx.stroke();
      tCtx.restore();
    }

    if (path.length > 2400) path.splice(0, path.length - 2400);
  }

  // ── Draw glow canvas (dot + particles) ────────────────────────────────────
  function drawGlow() {
    gCtx.clearRect(0, 0, glowC.width, glowC.height);
    if (!handVisible && dot.x < 0) return;

    // Chasing dot
    const r = 6;
    const grad = gCtx.createRadialGradient(dot.x, dot.y, 0, dot.x, dot.y, r * 9);
    grad.addColorStop(0,    `hsla(${hue},100%,100%,1)`);
    grad.addColorStop(0.12, `hsla(${hue},90%,90%,0.9)`);
    grad.addColorStop(0.5,  `hsla(${hue},80%,70%,0.3)`);
    grad.addColorStop(1,    `hsla(${hue},70%,60%,0)`);
    gCtx.beginPath();
    gCtx.arc(dot.x, dot.y, r * 9, 0, Math.PI * 2);
    gCtx.fillStyle = grad;
    gCtx.fill();

    gCtx.beginPath();
    gCtx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
    gCtx.fillStyle = '#fff';
    gCtx.shadowColor = `hsla(${hue},100%,90%,1)`;
    gCtx.shadowBlur  = 22;
    gCtx.fill();
    gCtx.shadowBlur  = 0;

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      const a = p.life * p.life;
      gCtx.save();
      gCtx.globalAlpha = a;
      gCtx.shadowColor = `hsla(${p.hue},90%,80%,1)`;
      gCtx.shadowBlur  = 10;
      gCtx.beginPath();
      gCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      gCtx.fillStyle = `hsla(${p.hue},90%,90%,1)`;
      gCtx.fill();
      gCtx.restore();
    }
  }

  // ── Main loop ──────────────────────────────────────────────────────────────
  function loop() {
    hue = (hue + 0.2) % 360;

    dot.x += (finger.x - dot.x) * 0.1;
    dot.y += (finger.y - dot.y) * 0.1;

    drawTrail();
    drawGlow();
    frameId = requestAnimationFrame(loop);
  }

  // ── Start button ───────────────────────────────────────────────────────────
  startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    loader.style.display   = 'block';
    initMediaPipe();
  });

})();
</script>
</body>
</html>
